<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پیگیری بار - ترانزیت گلد</title>
    <style>
        :root {
            --primary: #001F3F;
            --gold: #D4AF37;
            --dark: #0A0A0A;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Tahoma, Arial, sans-serif; line-height: 1.8; color: #eee; background: var(--dark); }
        
        header {
            background: rgba(0, 31, 63, 0.95);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        nav {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.2rem 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { font-size: 2.1rem; font-weight: bold; color: var(--gold); }

        .tracking-box {
            max-width: 800px;
            margin: 100px auto;
            background: #111;
            padding: 70px 50px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            text-align: center;
            border: 1px solid #333;
        }
        input {
            width: 100%;
            padding: 20px;
            font-size: 1.4rem;
            background: #222;
            border: 1px solid #555;
            border-radius: 12px;
            color: white;
            text-align: center;
            margin: 25px 0;
        }
        button {
            background: var(--gold);
            color: #000;
            padding: 18px 70px;
            border: none;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
        }
        .result {
            margin-top: 40px;
            padding: 30px;
            background: #1a1a1a;
            border-radius: 12px;
            display: none;
            text-align: right;
            border: 1px solid var(--gold);
        }
        footer {
            background: #000;
            color: #aaa;
            text-align: center;
            padding: 60px 20px;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">ترانزیت گلد</div>
            <div class="nav-links">
                <a href="index.html" style="margin:0 20px; color:white; text-decoration:none;">خانه</a>
                <a href="tracking.html" style="margin:0 20px; color:white; text-decoration:none;">پیگیری بار</a>
                <a href="contact.html" style="margin:0 20px; color:white; text-decoration:none;">تماس با ما</a>
            </div>
        </nav>
    </header>

    <div class="tracking-box">
        <h2 style="color: var(--gold);">پیگیری بار</h2>
        <p style="font-size: 1.3rem; margin: 25px 0;">شماره بارنامه یا کد پیگیری را وارد کنید</p>
        
        <input type="text" id="trackingCode" placeholder="مثال: TG-۱۴۰۴۱۲۳۴۵۶" />
        <button onclick="trackShipment()">پیگیری بار</button>

        <div id="result" class="result"></div>
    </div>

    <footer>
        <p>© ۱۴۰۴ - ترانزیت گلد | حمل و نقل بین‌المللی</p>
    </footer>

    <script>
        function trackShipment() {
            const code = document.getElementById('trackingCode').value.trim();
            const result = document.getElementById('result');
            
            if (code.length < 4) {
                result.style.display = 'block';
                result.innerHTML = `<p style="color: #ff6666;">لطفاً کد پیگیری معتبر وارد کنید</p>`;
                return;
            }
            
            result.style.display = 'block';
            result.innerHTML = `
                <h3 style="color: var(--gold);">بارنامه: ${code}</h3>
                <p><strong>وضعیت فعلی:</strong> در حال حمل</p>
                <p><strong>موقعیت:</strong> بندرعباس / مرز زمینی</p>
                <p><strong>زمان تخمینی تحویل:</strong> ۳ تا ۷ روز</p>
                <p style="margin-top: 25px; color: #aaa; font-size: 0.95rem;">
                    این بخش فعلاً آزمایشی است و بعداً به سیستم واقعی متصل خواهد شد.
                </p>
            `;
        }
    </script>
</body>
</html>
