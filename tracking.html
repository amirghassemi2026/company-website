<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پیگیری بار - ترانزیت گلد</title>
    <style>
        :root {
            --blue: #003087;
            --darkblue: #001f3f;
            --gold: #d4af37;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Tahoma, Arial, sans-serif; line-height: 1.8; color: #333; background: #f8f9fa; }

        header {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        nav {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.2rem 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { font-size: 2rem; font-weight: bold; color: var(--blue); }

        .tracking-container {
            max-width: 800px;
            margin: 100px auto;
            background: white;
            padding: 80px 60px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.12);
            text-align: center;
        }
        input {
            width: 100%;
            padding: 20px;
            font-size: 1.4rem;
            border: 2px solid #ddd;
            border-radius: 12px;
            margin: 30px 0;
            text-align: center;
        }
        button {
            background: var(--gold);
            color: #000;
            padding: 18px 70px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.25rem;
            cursor: pointer;
            transition: all 0.4s;
            box-shadow: 0 8px 25px rgba(212,175,55,0.3);
        }
        button:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(212,175,55,0.4);
        }
        .result {
            margin-top: 40px;
            padding: 35px;
            background: #f0f4f8;
            border-radius: 12px;
            display: none;
        }
        footer {
            background: var(--darkblue);
            color: #ccc;
            text-align: center;
            padding: 60px 20px;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">ترانزیت گلد</div>
            <div>
                <a href="index.html" style="margin:0 22px; color:#333; text-decoration:none; font-weight:500;">خانه</a>
                <a href="tracking.html" style="margin:0 22px; color:#333; text-decoration:none; font-weight:500;">پیگیری بار</a>
                <a href="contact.html" style="margin:0 22px; color:#333; text-decoration:none; font-weight:500;">تماس با ما</a>
            </div>
        </nav>
    </header>

    <div class="tracking-container">
        <h2 style="color: var(--blue); margin-bottom: 20px;">پیگیری بار</h2>
        <p style="font-size: 1.4rem; margin-bottom: 30px;">شماره بارنامه یا کد پیگیری خود را وارد کنید</p>
        
        <input type="text" id="trackingCode" placeholder="مثال: TG-۱۴۰۴۱۲۳۴۵۶" />
        <button onclick="trackShipment()">پیگیری بار</button>

        <div id="result" class="result"></div>
    </div>

    <footer>
        <p>© ۱۴۰۴ - ترانزیت گلد | حمل و نقل بین‌المللی مشهد</p>
        <p style="margin-top: 15px;">
            📞 +98 915 529 1700 &nbsp; | &nbsp; 
            📱 واتساپ: +98 915 126 9099
        </p>
    </footer>

    <script>
        function trackShipment() {
            const code = document.getElementById('trackingCode').value.trim();
            const result = document.getElementById('result');
            
            if (code.length < 4) {
                result.style.display = 'block';
                result.innerHTML = `<p style="color: red;">لطفاً کد پیگیری معتبر وارد کنید</p>`;
                return;
            }
            
            result.style.display = 'block';
            result.innerHTML = `
                <h3 style="color: var(--blue);">بارنامه: ${code}</h3>
                <p><strong>وضعیت فعلی:</strong> در حال حمل</p>
                <p><strong>موقعیت:</strong> بندرعباس / مرز زمینی</p>
                <p><strong>زمان تخمینی تحویل:</strong> ۳ تا ۷ روز</p>
            `;
        }
    </script>
</body>
</html>
