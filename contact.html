<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تماس با ما - حمل و نقل بین‌المللی</title>
    <style>
        :root {
            --primary: #001F3F;
            --gold: #D4AF37;
            --dark: #0A0A0A;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Tahoma, Arial, sans-serif; line-height: 1.8; color: #eee; background: var(--dark); }
        
        header {
            background: rgba(0, 31, 63, 0.95);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        nav {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.2rem 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { font-size: 2.1rem; font-weight: bold; color: var(--gold); }

        .contact-container {
            max-width: 1200px;
            margin: 80px auto;
            display: flex;
            flex-wrap: wrap;
            background: #111;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }
        .contact-info {
            background: linear-gradient(135deg, var(--primary), #002b5c);
            padding: 80px 60px;
            flex: 1;
            min-width: 320px;
        }
        .contact-form {
            padding: 80px 60px;
            flex: 1;
            min-width: 320px;
        }
        input, textarea {
            width: 100%;
            padding: 16px;
            margin: 12px 0;
            background: #222;
            border: 1px solid #444;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
        }
        button {
            background: var(--gold);
            color: #000;
            padding: 16px 50px;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
        }
        footer {
            background: #000;
            color: #aaa;
            text-align: center;
            padding: 60px 20px;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">ترانزیت گلد</div>
            <div class="nav-links">
                <a href="index.html" style="margin:0 20px; color:white; text-decoration:none;">خانه</a>
                <a href="tracking.html" style="margin:0 20px; color:white; text-decoration:none;">پیگیری بار</a>
                <a href="contact.html" style="margin:0 20px; color:white; text-decoration:none;">تماس با ما</a>
            </div>
        </nav>
    </header>

    <div class="contact-container">
        <div class="contact-info">
            <h2 style="color: var(--gold);">اطلاعات تماس</h2>
            <p style="margin: 35px 0; font-size: 1.25rem;">
                📍 دفتر مرکزی: مشهد، ایران<br><br>
                📞 تلفن:<br>
                📱 واتساپ و تلگرام:<br><br>
                🕒 پاسخگویی ۲۴ ساعته
            </p>
        </div>

        <div class="contact-form">
            <h2 style="color: var(--gold);">درخواست حمل بار</h2>
            <form action="https://formspree.io/f/your-email-here" method="POST">
                <input type="text" name="name" placeholder="نام و نام خانوادگی" required>
                <input type="tel" name="phone" placeholder="شماره تماس" required>
                <input type="email" name="email" placeholder="ایمیل">
                <textarea name="message" rows="6" placeholder="جزئیات بار (مبدا، مقصد، نوع بار، وزن تقریبی و ...)" required></textarea>
                <button type="submit">ارسال درخواست</button>
            </form>
        </div>
    </div>

    <footer>
        <p>© ۱۴۰۴ - ترانزیت گلد | حمل و نقل بین‌المللی</p>
    </footer>
</body>
</html>
